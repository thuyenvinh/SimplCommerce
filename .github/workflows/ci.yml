name: ci

on:
  push:
    branches: [main, master, 'aspire-migration/**', 'claude/**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SimplCommerce.sln

      - name: Build (warnings as errors)
        run: dotnet build SimplCommerce.sln --no-restore -c Release -p:TreatWarningsAsErrors=true

      - name: Test (with coverage)
        run: >
          dotnet test SimplCommerce.sln --no-build -c Release
          --logger "trx;LogFileName=tests.trx"
          --results-directory artifacts/tests
          --collect:"XPlat Code Coverage"
          --settings tests/coverlet.runsettings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-${{ github.run_id }}
          path: artifacts/tests

      - name: Install reportgenerator
        if: always()
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Aggregate coverage
        if: always()
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:artifacts/tests/**/coverage.cobertura.xml" \
            "-targetdir:artifacts/coverage" \
            "-reporttypes:Cobertura;HtmlSummary;TextSummary;MarkdownSummaryGithub"
          cat artifacts/coverage/Summary.txt || true
          if [ -f artifacts/coverage/SummaryGithub.md ]; then
            cat artifacts/coverage/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: artifacts/coverage

  publish-images:
    # Only publish on pushes to the primary migration branches; PRs stay in the
    # build-test job so forked branches can't push to the registry.
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: api,        dockerfile: src/Apps/SimplCommerce.ApiService/Dockerfile,  image: simpl-api }
          - { app: storefront, dockerfile: src/Apps/SimplCommerce.Storefront/Dockerfile,   image: simpl-storefront }
          - { app: admin,      dockerfile: src/Apps/SimplCommerce.Admin/Dockerfile,        image: simpl-admin }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to:   type=gha,scope=${{ matrix.app }},mode=max
