# Azure DevOps pipeline for SimplCommerce on .NET 9 + Aspire.
# Replaces the legacy 4-matrix (Linux/macOS/Windows/LinuxRelease) setup that
# still targeted .NET 8 + the old test layout. For Phase 8, CI focuses on
# one fast Linux build + containerised publish; the GitHub Actions
# equivalent lives at .github/workflows/ci.yml.

trigger:
  branches:
    include:
      - master
      - aspire-migration/*

variables:
  buildConfiguration: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

stages:
  - stage: build
    jobs:
      - job: BuildAndTest
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: sdk
              useGlobalJson: true

          - script: dotnet restore SimplCommerce.sln
            displayName: Restore

          - script: dotnet build SimplCommerce.sln --no-restore -c $(buildConfiguration) -p:TreatWarningsAsErrors=true
            displayName: Build

          - script: dotnet test SimplCommerce.sln --no-build -c $(buildConfiguration) --logger trx --results-directory $(Agent.TempDirectory)/tests
            displayName: Test

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/tests/*.trx'

  - stage: images
    dependsOn: build
    condition: and(succeeded(), in(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - job: Publish
        pool:
          vmImage: ubuntu-latest
        strategy:
          matrix:
            api:
              dockerfile: src/Apps/SimplCommerce.ApiService/Dockerfile
              imageName: simpl-api
            storefront:
              dockerfile: src/Apps/SimplCommerce.Storefront/Dockerfile
              imageName: simpl-storefront
            admin:
              dockerfile: src/Apps/SimplCommerce.Admin/Dockerfile
              imageName: simpl-admin
        steps:
          - task: Docker@2
            inputs:
              command: buildAndPush
              repository: $(imageName)
              dockerfile: $(dockerfile)
              buildContext: '.'
              tags: |
                $(Build.SourceVersion)
                $(Build.SourceBranchName)
